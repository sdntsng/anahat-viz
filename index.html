<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adolescent Health Dashboard - Zonal View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans', sans-serif; background-color: #f3f4f6; }
        .dashboard-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); transition: transform 0.2s; }
        .dashboard-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .zone-red { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); border-left: 6px solid #dc2626; }
        .zone-blue { background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%); border-left: 6px solid #2563eb; }
        .zone-green { background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); border-left: 6px solid #16a34a; }
        .table-header { background-color: #f8fafc; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #e5e7eb; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, Cell, PieChart, Pie } = Recharts;
        const { AlertTriangle, CheckCircle, Info, ChevronLeft, Download, Phone, User, MapPin, Calendar, Activity, ShieldAlert } = lucide;

        // --- MOCK DATA ---
        const districts = [
            { id: '664', name: 'ALIPURDUAR' }, { id: '305', name: 'BANKURA' },
            { id: '307', name: 'BIRBHUM' }, { id: '308', name: 'COOCHBEHAR' },
            { id: '310', name: 'DAKSHIN DINAJPUR' }, { id: '309', name: 'DARJEELING' }
        ];
        const blocks = ['BLOCK A', 'BLOCK B', 'BLOCK C', 'BLOCK D'];
        const gps = ['GP GARDEN 1', 'GP GARDEN 2', 'GP GARDEN 3', 'GP GARDEN 4', 'GP GARDEN 5'];
        const reportFor = ['ZP', 'PS', 'GP'];

        const ashaWorkers = [
            { name: 'Sunita Devi', phone: '9876543210' },
            { name: 'Manorama Singh', phone: '9123456780' },
            { name: 'Lakshmi Prasad', phone: '9988776655' },
            { name: 'Anita Kumari', phone: '8765432109' },
            { name: 'Rekha Yadav', phone: '9012345678' }
        ];

        // Generate detailed adolescent records
        const generateData = () => {
            const data = [];
            const locations = ['Garden Colony', 'Basanti Para', 'Netaji Nagar', 'Green Valley', 'Shanti Vihar'];
            const names = ['Priya', 'Sunita', 'Anjali', 'Rani', 'Deepa', 'Poonam', 'Kavita', 'Babita', 'Geeta', 'Seema'];
            
            locations.forEach((loc, idx) => {
                const asha = ashaWorkers[idx % ashaWorkers.length];
                // Determine risk profile based on location index to create variety
                let baseRisk = 'green';
                if (idx === 0 || idx === 3) baseRisk = 'red';
                if (idx === 2) baseRisk = 'blue';

                for (let i = 0; i < 15; i++) {
                    const anemiaRoll = Math.random();
                    let anemia = 'Mild';
                    if (baseRisk === 'red' && anemiaRoll > 0.3) anemia = 'Severe';
                    else if (baseRisk === 'red' && anemiaRoll > 0.1) anemia = 'Moderate';
                    else if (baseRisk === 'blue' && anemiaRoll > 0.6) anemia = 'Moderate';
                    else if (anemiaRoll > 0.8) anemia = 'Moderate';

                    const attendanceRoll = Math.random();
                    let attendance = Math.floor(attendanceRoll * 100);
                    if (baseRisk === 'red') attendance = Math.floor(Math.random() * 50); // Low attendance
                    if (baseRisk === 'green') attendance = 80 + Math.floor(Math.random() * 20); // High attendance

                    const livingRoll = Math.random();
                    let livingWithParents = 'Yes';
                    if (livingRoll > (baseRisk === 'red' ? 0.3 : 0.8)) livingWithParents = 'No';

                    data.push({
                        id: idx * 100 + i,
                        name: names[i % names.length] + ' ' + ['Devi', 'Kumari', 'Singh', 'Yadav'][i % 4],
                        age: 12 + Math.floor(Math.random() * 6),
                        location: loc,
                        district: districts[0].name,
                        block: blocks[idx % blocks.length],
                        gp: gps[idx % gps.length],
                        anemia,
                        ashaAttendance: attendance,
                        livingWithParents,
                        phone: '98' + Math.floor(Math.random() * 100000000),
                        ashaName: asha.name,
                        ashaPhone: asha.phone
                    });
                }
            });
            return data;
        };

        const fullData = generateData();

        // --- COMPONENTS ---

        const ZonalBadge = ({ zone }) => {
            const styles = {
                red: 'bg-red-100 text-red-800 border-red-200',
                blue: 'bg-blue-100 text-blue-800 border-blue-200',
                green: 'bg-green-100 text-green-800 border-green-200'
            };
            const labels = { red: 'RED ZONE', blue: 'BLUE ZONE', green: 'GREEN ZONE' };
            const icons = { red: <ShieldAlert size={14}/>, blue: <Info size={14}/>, green: <CheckCircle size={14}/> };
            
            return (
                <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-bold border ${styles[zone]}`}>
                    {icons[zone]} {labels[zone]}
                </span>
            );
        };

        const FilterBar = ({ filters, setFilters }) => {
            const now = new Date().toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'medium' });
            
            return (
                <div className="glass-header sticky top-0 z-50 px-6 py-4 mb-6">
                    <div className="max-w-7xl mx-auto">
                        <div className="flex items-center justify-between mb-4">
                            <div>
                                <h1 className="text-2xl font-bold text-cyan-900 flex items-center gap-2">
                                    <Activity className="text-cyan-600"/> Adolescent Health Dashboard
                                </h1>
                                <p className="text-sm text-gray-500 mt-1 flex items-center gap-1">
                                    <Calendar size={14}/> Data as on {now}
                                </p>
                            </div>
                            <div className="flex gap-2">
                                <button className="px-4 py-2 bg-cyan-50 text-cyan-700 rounded-lg text-sm font-medium hover:bg-cyan-100 transition">
                                    English
                                </button>
                                <button className="px-4 py-2 text-gray-600 hover:bg-gray-50 rounded-lg text-sm font-medium transition">
                                    हिन्दी
                                </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-200">
                            <div className="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">District</label>
                                    <select className="w-full p-2 h-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none text-sm"
                                        value={filters.district} onChange={e => setFilters({...filters, district: e.target.value})}>
                                        <option value="">Select District</option>
                                        {districts.map(d => <option key={d.id} value={d.name}>{d.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">Block</label>
                                    <select className="w-full p-2 h-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none text-sm"
                                        value={filters.block} onChange={e => setFilters({...filters, block: e.target.value})}>
                                        <option value="">Select Block</option>
                                        {blocks.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">Gram Panchayat</label>
                                    <select className="w-full p-2 h-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none text-sm"
                                        value={filters.gp} onChange={e => setFilters({...filters, gp: e.target.value})}>
                                        <option value="">Select Gram Panchayat</option>
                                        {gps.map(g => <option key={g} value={g}>{g}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">Report For <span className="text-red-500">*</span></label>
                                    <select className="w-full p-2 h-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none text-sm"
                                        value={filters.reportFor} onChange={e => setFilters({...filters, reportFor: e.target.value})}>
                                        <option value="">Select Report For</option>
                                        {reportFor.map(r => <option key={r} value={r}>{r}</option>)}
                                    </select>
                                </div>
                                <button className="h-10 px-6 bg-cyan-700 text-white rounded-lg hover:bg-cyan-800 transition shadow-md font-medium text-sm flex items-center justify-center gap-2">
                                    <MapPin size={16}/> Search
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const SummaryCards = ({ data }) => {
            const total = data.length;
            const checked = data.filter(d => d.anemia !== null).length;
            const girlsChecked = Math.floor(checked * 0.69); // 69% logic
            const redZones = new Set(data.filter(d => d.anemia === 'Severe' || d.ashaAttendance < 50).map(d => d.location)).size;

            return (
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 animate-fade-in">
                    <div className="dashboard-card p-5 border-l-4 border-cyan-500">
                        <div className="text-gray-500 text-sm font-medium">Total Adolescents Covered</div>
                        <div className="text-3xl font-bold text-gray-800 mt-1">{total}</div>
                    </div>
                    <div className="dashboard-card p-5 border-l-4 border-purple-500">
                        <div className="text-gray-500 text-sm font-medium">Checked for Anemia</div>
                        <div className="text-3xl font-bold text-gray-800 mt-1">{Math.round((checked/total)*100)}%</div>
                        <div className="text-xs text-gray-400 mt-1">{checked} individuals</div>
                    </div>
                    <div className="dashboard-card p-5 border-l-4 border-pink-500">
                        <div className="text-gray-500 text-sm font-medium">Girls Checked</div>
                        <div className="text-3xl font-bold text-gray-800 mt-1">42%</div>
                        <div className="text-xs text-gray-400 mt-1">of total screened</div>
                    </div>
                    <div className="dashboard-card p-5 border-l-4 border-red-500">
                        <div className="text-gray-500 text-sm font-medium">High Risk Areas (Red)</div>
                        <div className="text-3xl font-bold text-red-600 mt-1">{redZones}</div>
                        <div className="text-xs text-red-400 mt-1">Immediate attention</div>
                    </div>
                </div>
            );
        };

        const ZoningLayer = ({ data }) => {
            const zones = useMemo(() => {
                const locMap = {};
                data.forEach(d => {
                    if (!locMap[d.location]) locMap[d.location] = { ...d, records: [] };
                    locMap[d.location].records.push(d);
                });

                return Object.values(locMap).map(loc => {
                    const severe = loc.records.filter(r => r.anemia === 'Severe').length;
                    const moderate = loc.records.filter(r => r.anemia === 'Moderate').length;
                    const lowAttend = loc.records.filter(r => r.ashaAttendance < 50).length;
                    const notWithParents = loc.records.filter(r => r.livingWithParents === 'No').length;
                    const total = loc.records.length;

                    let zone = 'blue';
                    if (severe > 0 || moderate >= 2 || lowAttend > 5) zone = 'red';
                    else if (severe === 0 && moderate === 0 && loc.records.every(r => r.ashaAttendance >= 80)) zone = 'green';

                    return {
                        location: loc.location,
                        zone,
                        ashaName: loc.ashaName,
                        ashaPhone: loc.ashaPhone,
                        stats: { severe, moderate, lowAttend, notWithParents, total }
                    };
                });
            }, [data]);

            const redZones = zones.filter(z => z.zone === 'red');

            if (redZones.length === 0) return null;

            return (
                <div className="mb-6 animate-fade-in">
                    <h2 className="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                        <AlertTriangle className="text-red-600"/> Critical Intervention Zones
                    </h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {redZones.map((z, i) => (
                            <div key={i} className="zone-red rounded-xl p-4 shadow-sm">
                                <div className="flex justify-between items-start mb-2">
                                    <h3 className="font-bold text-red-900">{z.location}</h3>
                                    <ZonalBadge zone="red" />
                                </div>
                                <div className="text-sm text-red-800 space-y-1 mb-3">
                                    <p>{z.stats.severe} Severe Anemia Cases</p>
                                    <p>{z.stats.lowAttend} Low ASHA Attendance</p>
                                </div>
                                <div className="bg-white/50 rounded-lg p-2 mt-2 border border-red-100">
                                    <p className="text-xs font-bold text-red-800 uppercase mb-1">Concerned ASHA Didi</p>
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-2 text-red-900">
                                            <User size={16}/>
                                            <span className="font-semibold text-sm">{z.ashaName}</span>
                                        </div>
                                        <div className="flex items-center gap-1 text-red-700">
                                            <Phone size={14}/>
                                            <span className="font-mono text-sm">{z.ashaPhone}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const AnemiaChart = ({ data, onDrillDown }) => {
            const chartData = useMemo(() => {
                const locs = [...new Set(data.map(d => d.location))];
                return locs.map(loc => {
                    const items = data.filter(d => d.location === loc);
                    return {
                        name: loc,
                        Mild: items.filter(d => d.anemia === 'Mild').length,
                        Moderate: items.filter(d => d.anemia === 'Moderate').length,
                        Severe: items.filter(d => d.anemia === 'Severe').length,
                    };
                });
            }, [data]);

            const handleClick = (entry) => {
                if (entry && entry.activePayload) {
                    onDrillDown('Anemia', entry.activePayload[0].payload.name);
                }
            };

            return (
                <div className="dashboard-card p-6 col-span-1 lg:col-span-2 animate-fade-in">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="font-bold text-gray-800 text-lg">Anemia Severity by Location</h3>
                        <span className="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded">Click bars to view details</span>
                    </div>
                    <ResponsiveContainer width="100%" height={300}>
                        <BarChart data={chartData} onClick={handleClick} cursor="pointer">
                            <CartesianGrid strokeDasharray="3 3" vertical={false} />
                            <XAxis dataKey="name" tick={{fontSize: 12}} />
                            <YAxis tick={{fontSize: 12}} />
                            <Tooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgba(0, 0, 0, 0.1)'}} />
                            <Legend />
                            <Bar dataKey="Mild" fill="#fbbf24" radius={[4, 4, 0, 0]} />
                            <Bar dataKey="Moderate" fill="#f97316" radius={[4, 4, 0, 0]} />
                            <Bar dataKey="Severe" fill="#dc2626" radius={[4, 4, 0, 0]} />
                        </BarChart>
                    </ResponsiveContainer>
                </div>
            );
        };

        const AttendanceChart = ({ data, onDrillDown }) => {
            const chartData = useMemo(() => {
                const locs = [...new Set(data.map(d => d.location))];
                return locs.map(loc => {
                    const items = data.filter(d => d.location === loc);
                    const avg = Math.round(items.reduce((a, b) => a + b.ashaAttendance, 0) / items.length);
                    return { name: loc, attendance: avg };
                });
            }, [data]);

            const handleClick = (entry) => {
                if (entry && entry.activePayload) {
                    onDrillDown('Attendance', entry.activePayload[0].payload.name);
                }
            };

            return (
                <div className="dashboard-card p-6 col-span-1 animate-fade-in">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="font-bold text-gray-800 text-lg">ASHA Meeting Attendance</h3>
                    </div>
                    <ResponsiveContainer width="100%" height={300}>
                        <BarChart data={chartData} layout="vertical" onClick={handleClick} cursor="pointer">
                            <CartesianGrid strokeDasharray="3 3" horizontal={false} />
                            <XAxis type="number" domain={[0, 100]} tick={{fontSize: 12}} />
                            <YAxis dataKey="name" type="category" width={100} tick={{fontSize: 12}} />
                            <Tooltip formatter={(val) => `${val}%`} contentStyle={{borderRadius: '8px'}} />
                            <Bar dataKey="attendance" fill="#06b6d4" radius={[0, 4, 4, 0]}>
                                {chartData.map((entry, index) => (
                                    <Cell key={`cell-${index}`} fill={entry.attendance < 50 ? '#ef4444' : '#06b6d4'} />
                                ))}
                            </Bar>
                        </BarChart>
                    </ResponsiveContainer>
                </div>
            );
        };

        const LivingArrangementChart = ({ data, onDrillDown }) => {
             const chartData = useMemo(() => {
                const locs = [...new Set(data.map(d => d.location))];
                return locs.map(loc => {
                    const items = data.filter(d => d.location === loc);
                    return {
                        name: loc,
                        'With Parents': items.filter(d => d.livingWithParents === 'Yes').length,
                        'Not With Parents': items.filter(d => d.livingWithParents === 'No').length
                    };
                });
            }, [data]);

            const handleClick = (entry) => {
                if (entry && entry.activePayload) {
                    onDrillDown('Living Arrangement', entry.activePayload[0].payload.name);
                }
            };

            return (
                <div className="dashboard-card p-6 col-span-1 animate-fade-in">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="font-bold text-gray-800 text-lg">Living Arrangements</h3>
                    </div>
                    <ResponsiveContainer width="100%" height={300}>
                        <BarChart data={chartData} onClick={handleClick} cursor="pointer">
                            <CartesianGrid strokeDasharray="3 3" vertical={false} />
                            <XAxis dataKey="name" tick={{fontSize: 12}} />
                            <YAxis tick={{fontSize: 12}} />
                            <Tooltip contentStyle={{borderRadius: '8px'}} />
                            <Legend />
                            <Bar dataKey="With Parents" fill="#10b981" radius={[4, 4, 0, 0]} />
                            <Bar dataKey="Not With Parents" fill="#6366f1" radius={[4, 4, 0, 0]} />
                        </BarChart>
                    </ResponsiveContainer>
                </div>
            );
        };

        const DetailView = ({ type, location, data, onBack }) => {
            const filteredData = data.filter(d => d.location === location);
            
            const getZone = (item) => {
                if (item.anemia === 'Severe') return 'red';
                if (item.anemia === 'Moderate') return 'blue';
                return 'green';
            };

            const downloadCSV = () => {
                const headers = ['Name', 'Age', 'Location', 'Anemia Status', 'ASHA Attendance %', 'Living with Parents', 'Phone', 'ASHA Didi', 'ASHA Phone'];
                const rows = filteredData.map(d => [d.name, d.age, d.location, d.anemia, d.ashaAttendance, d.livingWithParents, d.phone, d.ashaName, d.ashaPhone]);
                const csvContent = "data:text/csv;charset=utf-8," + [headers, ...rows].map(e => e.join(",")).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `${location}_adolescent_data.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="animate-fade-in max-w-7xl mx-auto px-6">
                    <div className="flex items-center justify-between mb-6">
                        <div>
                            <button onClick={onBack} className="flex items-center gap-2 text-cyan-700 hover:text-cyan-900 font-medium mb-2">
                                <ChevronLeft size={20}/> Back to Dashboard
                            </button>
                            <h2 className="text-2xl font-bold text-gray-800">{location} - {type} Details</h2>
                            <p className="text-gray-500 text-sm">Showing {filteredData.length} individual records</p>
                        </div>
                        <div className="flex gap-3">
                             <button className="px-4 py-2 bg-green-50 text-green-700 rounded-lg text-sm font-medium hover:bg-green-100 transition border border-green-200 flex items-center gap-2">
                                <Phone size={16}/> Call ASHA: {filteredData[0]?.ashaPhone}
                            </button>
                            <button onClick={downloadCSV} className="px-4 py-2 bg-cyan-700 text-white rounded-lg text-sm font-medium hover:bg-cyan-800 transition shadow-md flex items-center gap-2">
                                <Download size={16}/> Export Excel / Drive
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead className="table-header text-xs text-gray-700 uppercase border-b border-gray-200">
                                    <tr>
                                        <th className="px-6 py-4 font-bold">Zone</th>
                                        <th className="px-6 py-4 font-bold">Name</th>
                                        <th className="px-6 py-4 font-bold">Age</th>
                                        <th className="px-6 py-4 font-bold">Anemia Status</th>
                                        <th className="px-6 py-4 font-bold">ASHA Attendance</th>
                                        <th className="px-6 py-4 font-bold">Living w/ Parents</th>
                                        <th className="px-6 py-4 font-bold">Phone Number</th>
                                        <th className="px-6 py-4 font-bold">ASHA Didi</th>
                                        <th className="px-6 py-4 font-bold">ASHA Contact</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {filteredData.map((item, idx) => (
                                        <tr key={idx} className="hover:bg-gray-50 transition">
                                            <td className="px-6 py-4"><ZonalBadge zone={getZone(item)} /></td>
                                            <td className="px-6 py-4 font-medium text-gray-900">{item.name}</td>
                                            <td className="px-6 py-4">{item.age}</td>
                                            <td className="px-6 py-4">
                                                <span className={`px-2 py-1 rounded text-xs font-bold ${
                                                    item.anemia === 'Severe' ? 'bg-red-100 text-red-700' :
                                                    item.anemia === 'Moderate' ? 'bg-orange-100 text-orange-700' :
                                                    'bg-yellow-100 text-yellow-700'
                                                }`}>
                                                    {item.anemia}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-16 bg-gray-200 rounded-full h-2">
                                                        <div className={`h-2 rounded-full ${item.ashaAttendance < 50 ? 'bg-red-500' : 'bg-cyan-500'}`} style={{width: `${item.ashaAttendance}%`}}></div>
                                                    </div>
                                                    <span className={`text-xs font-bold ${item.ashaAttendance < 50 ? 'text-red-600' : 'text-gray-600'}`}>
                                                        {item.ashaAttendance}%
                                                    </span>
                                                </div>
                                            </td>
                                            <td className="px-6 py-4">
                                                <span className={`px-2 py-1 rounded text-xs font-medium ${item.livingWithParents === 'Yes' ? 'bg-green-100 text-green-700' : 'bg-indigo-100 text-indigo-700'}`}>
                                                    {item.livingWithParents}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4 font-mono text-gray-600">{item.phone}</td>
                                            <td className="px-6 py-4 text-gray-700">{item.ashaName}</td>
                                            <td className="px-6 py-4 font-mono text-cyan-700">{item.ashaPhone}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard'); // dashboard | detail
            const [detailConfig, setDetailConfig] = useState({});
            const [filters, setFilters] = useState({ district: '', block: '', gp: '', reportFor: '' });

            const handleDrillDown = (type, location) => {
                setDetailConfig({ type, location });
                setView('detail');
                window.scrollTo(0, 0);
            };

            const filteredData = useMemo(() => {
                return fullData.filter(d => {
                    if (filters.district && d.district !== filters.district) return false;
                    if (filters.block && d.block !== filters.block) return false;
                    if (filters.gp && d.gp !== filters.gp) return false;
                    return true;
                });
            }, [filters]);

            return (
                <div className="min-h-screen pb-12">
                    <FilterBar filters={filters} setFilters={setFilters} />
                    
                    {view === 'dashboard' && (
                        <div className="max-w-7xl mx-auto px-6 animate-fade-in">
                            <SummaryCards data={filteredData} />
                            <ZoningLayer data={filteredData} />
                            
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                                <AnemiaChart data={filteredData} onDrillDown={handleDrillDown} />
                                <AttendanceChart data={filteredData} onDrillDown={handleDrillDown} />
                            </div>
                            
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <LivingArrangementChart data={filteredData} onDrillDown={handleDrillDown} />
                                <div className="dashboard-card p-6 col-span-1 lg:col-span-2 bg-gradient-to-br from-cyan-50 to-blue-50 border border-cyan-100">
                                    <h3 className="font-bold text-cyan-900 text-lg mb-2">Intervention Pipeline</h3>
                                    <p className="text-cyan-800 text-sm mb-4">Active follow-ups and ASHA worker coordination required in the following areas:</p>
                                    <div className="space-y-3">
                                        {[...new Set(filteredData.filter(d => d.anemia === 'Severe').map(d => d.location))].slice(0, 3).map((loc, i) => (
                                            <div key={i} className="flex items-center justify-between bg-white p-3 rounded-lg shadow-sm">
                                                <div className="flex items-center gap-3">
                                                    <div className="bg-red-100 p-2 rounded-full text-red-600">
                                                        <Phone size={16}/>
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-gray-800 text-sm">{loc}</p>
                                                        <p className="text-xs text-gray-500">Severe Anemia Detected</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => handleDrillDown('Anemia', loc)} className="text-cyan-700 text-xs font-bold hover:underline">
                                                    View Details
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'detail' && (
                        <DetailView 
                            type={detailConfig.type} 
                            location={detailConfig.location} 
                            data={filteredData} 
                            onBack={() => setView('dashboard')} 
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
