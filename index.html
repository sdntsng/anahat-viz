            <div className="px-6 pt-8 pb-6">
              <div className="flex items-center gap-2.5">
                <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-sm">
                  <HeartPulse className="text-white" size={18} strokeWidth={2.5} />
                </div>
                <span className="text-lg font-bold tracking-tight text-zinc-900 font-display">Anahat.</span>
              </div>
              <p className="text-zinc-500 text-xs mt-2 font-medium tracking-wide uppercase">{t.app_title}</p>
            </div>

            <nav className="flex-1 px-3 space-y-1 mt-2">
              <NavItem icon={<Activity />} label={t.nav_dashboard} active={activeTab === 'overview'} onClick={() => setActiveTab('overview')} />
              <NavItem icon={<Users />} label={t.nav_adolescents} />
              <NavItem icon={<FileText />} label={t.nav_schemes} />
              <NavItem icon={<Activity />} label={t.nav_camps} />
              <NavItem icon={<GraduationCap />} label={t.nav_edu} />
            </nav>

            <div className="p-4 mx-3 mb-6 bg-white border border-slate-200/80 rounded-2xl shadow-sm stagger-item" style={{ animationDelay: '0.6s' }}>
              <div className="flex items-center justify-between mb-2">
                <p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider">{t.active_area}</p>
                <MapPin size={12} className="text-slate-400" />
              </div>
              <p className="text-sm font-medium text-zinc-800">
                {lang === 'en' ? 'Alipurduar, Block-A' : 'अलीपुरद्वार, ब्लॉक-A'}
              </p>
            </div>
          </aside>

          {/* Main Content */}
          <main className="flex-1 flex flex-col h-screen overflow-y-auto relative">

            {/* Top Header */}
            <header className="bg-[#FAFAFA]/80 backdrop-blur-xl border-b border-slate-200/60 px-8 py-5 flex items-center justify-between sticky top-0 z-20">
              <div>
                <h2 className="text-xl font-semibold tracking-tight text-zinc-900 font-display">{t.header_title}</h2>
                <p className="text-sm text-zinc-500 mt-0.5">{t.header_sub}</p>
              </div>

              <div className="flex items-center gap-4">
                <div className="relative hidden lg:block group">
                  <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors" size={16} />
                  <input
                    type="text"
                    placeholder={t.search_placeholder}
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="pl-9 pr-4 py-2 bg-white border border-slate-200/80 rounded-full text-sm placeholder:text-slate-400 focus:outline-none focus:border-indigo-300 focus:ring-4 focus:ring-indigo-50 transition-all w-64 shadow-sm"
                  />
                </div>

                <div className="h-6 w-px bg-slate-200 mx-1 hidden lg:block"></div>

                <button
                  onClick={() => setLang(lang === 'en' ? 'hi' : 'en')}
                  className="flex items-center gap-1.5 px-3 py-1.5 bg-white border border-slate-200/80 hover:bg-slate-50 hover:border-slate-300 text-zinc-700 rounded-full text-xs font-semibold transition-all shadow-sm"
                >
                  <Globe size={14} className="text-zinc-500" />
                  {lang === 'en' ? 'हिन्दी' : 'English'}
                </button>

                <button className="relative p-2 text-zinc-400 hover:text-zinc-700 hover:bg-zinc-100 rounded-full transition-colors">
                  <Bell size={18} />
                  <span className="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 border-2 border-[#FAFAFA] rounded-full"></span>
                </button>

                <div className="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center border border-indigo-100 overflow-hidden ml-1 cursor-pointer">
                  <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Asha&backgroundColor=e0e7ff" alt="User" className="w-full h-full object-cover" />
                </div>
              </div>
            </header>

            {/* Dashboard Content */}
            {view === 'detail' ? (
              <DetailView 
                location={detailLocation} 
                data={filteredData} 
                t={t} 
                onBack={handleBack} 
              />
            ) : (
              <div className="p-8 space-y-6 max-w-[1400px] mx-auto w-full">

                {/* Geo Filter Bar */}
                <GeoFilterBar filters={filters} setFilters={setFilters} t={t} />

                {/* Zoning Layer */}
                <ZoningPanel data={filteredData} t={t} onDrillDown={handleDrillDown} />

                {/* KPI Cards */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                  <KpiCard
                    title={t.kpi1_title}
                    value={filteredData.length.toLocaleString()}
                    subtitle={t.kpi1_sub}
                    trend="up"
                    trendValue="+12"
                    icon={<Users size={20} className="text-indigo-600" />}
                    iconBg="bg-indigo-50"
                  />
                  <KpiCard
                    title={t.kpi2_title}
                    value={filteredData.filter(d => d.anemia === 'Severe').length.toString()}
                    subtitle={t.kpi2_sub}
                    trend="down"
                    trendValue="-5%"
                    icon={<Droplet size={20} className="text-rose-600" />}
                    iconBg="bg-rose-50"
                    alert
                  />
                  <KpiCard
                    title={t.kpi3_title}
                    value="69%"
                    subtitle={t.kpi3_sub}
                    trend="up"
                    trendValue="+2%"
                    icon={<ShieldAlert size={20} className="text-amber-600" />}
                    iconBg="bg-amber-50"
                  />
                  <KpiCard
                    title={t.kpi4_title}
                    value="42%"
                    subtitle={t.kpi4_sub}
                    trend="neutral"
                    trendValue="0"
                    icon={<FileText size={20} className="text-emerald-600" />}
                    iconBg="bg-emerald-50"
                  />
                </div>

                {/* Location Charts */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                  <LocationChartPanel 
                    title={t.chart_anemia_loc} 
                    subtitle="Click bars to view individual records"
                    data={anemiaChartData} 
                    t={t}
                    onDrillDown={handleDrillDown}
                  />
                  <LocationChartPanel 
                    title={t.chart_attendance_loc} 
                    subtitle="ASHA meeting attendance by area"
                    data={attendanceChartData} 
                    t={t}
                    onDrillDown={handleDrillDown}
                  />
                  <LocationChartPanel 
                    title={t.chart_living_loc} 
                    subtitle="Adolescents not living with parents"
                    data={livingChartData} 
                    t={t}
                    onDrillDown={handleDrillDown}
                  />
                </div>

                {/* Charts + Alerts */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">

                  <div className="lg:col-span-2 space-y-6">

                    {/* Hb Distribution Chart */}
                    <div className="bg-white p-6 rounded-[24px] border border-slate-200/75 shadow-sm relative overflow-hidden stagger-item" style={{ animationDelay: '0.5s' }}>
                      <div className="flex justify-between items-start mb-8 relative z-10">
                        <div>
                          <h3 className="text-base font-semibold tracking-tight text-zinc-900 flex items-center gap-2 font-display">
                            {t.chart_title}
                          </h3>
                          <p className="text-sm text-zinc-500 mt-1">Population health distribution based on recent camps</p>
                        </div>
                        <button className="text-xs font-medium text-zinc-500 bg-zinc-50 border border-zinc-200/80 rounded-full px-3 py-1.5 hover:bg-zinc-100 transition-colors flex items-center gap-1">
                          {t.chart_opt1} <ChevronRight size={14} />
                        </button>
                      </div>

                      <div className="relative h-60 mt-4 border-b border-zinc-200">
                        <div className="absolute inset-0 flex flex-col justify-between pb-6">
                          {[...Array(5)].map((_, i) => (
                            <div key={i} className="w-full border-t border-zinc-100 h-0"></div>
                          ))}
                        </div>

                        <div className="absolute inset-0 flex items-end justify-around pb-0 px-4">
                          <Bar heightClass="h-16" color="bg-rose-400" label="< 9.0" val="8%" delay={600} />
                          <Bar heightClass="h-28" color="bg-amber-400" label="9.0 - 10.9" val="17%" delay={750} />
                          <Bar heightClass="h-44" color="bg-emerald-300" label="11.0 - 11.9" val="35%" delay={900} />
                          <Bar heightClass="h-56" color="bg-emerald-500" label="12.0+" val="40%" delay={1050} />
                        </div>
                      </div>

                      <div className="mt-6 flex gap-6 justify-center text-xs text-zinc-600 font-medium flex-wrap">
                        <span className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-sm bg-rose-400"></div> {t.chart_severe}</span>
                        <span className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-sm bg-amber-400"></div> {t.chart_moderate}</span>
                        <span className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-sm bg-emerald-300"></div> {t.chart_mild}</span>
                        <span className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-sm bg-emerald-500"></div> {t.chart_normal}</span>
                      </div>
                    </div>

                    {/* Progress Bars */}
                    <div className="bg-white p-6 rounded-[24px] border border-slate-200/75 shadow-sm grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8 stagger-item" style={{ animationDelay: '0.7s' }}>
                      <div>
                        <h3 className="text-sm font-semibold text-zinc-900 mb-5 font-display">{t.prog1_title}</h3>
                        <div className="space-y-4">
                          <ProgressBar label={t.prog1_1} percentage={65} color="bg-indigo-500" delay={900} />
                          <ProgressBar label={t.prog1_2} percentage={25} color="bg-amber-400" delay={1100} />
                          <ProgressBar label={t.prog1_3} percentage={10} color="bg-slate-300" delay={1300} />
                        </div>
                      </div>
                      <div>
                        <h3 className="text-sm font-semibold text-zinc-900 mb-5 font-display">{t.prog2_title}</h3>
                        <div className="space-y-4">
                          <ProgressBar label={t.prog2_1} percentage={78} color="bg-emerald-500" delay={1000} />
                          <ProgressBar label={t.prog2_2} percentage={42} color="bg-rose-400" delay={1200} />
                          <ProgressBar label={t.prog2_3} percentage={91} color="bg-indigo-400" delay={1400} />
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Alerts Panel */}
                  <div className="bg-white rounded-[24px] border border-slate-200/75 shadow-sm overflow-hidden flex flex-col stagger-item" style={{ animationDelay: '0.65s' }}>
                    <div className="p-6 border-b border-zinc-100 flex justify-between items-center bg-white">
                      <div>
                        <h3 className="text-base font-semibold tracking-tight text-zinc-900 flex items-center gap-2 font-display">
                          {t.alert_title}
                          <span className="flex h-2 w-2 relative">
                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                            <span className="relative inline-flex rounded-full h-2 w-2 bg-rose-500"></span>
                          </span>
                        </h3>
                        <p className="text-xs text-zinc-500 mt-1">{t.alert_sub}</p>
                      </div>
                      <button className="text-zinc-400 hover:text-zinc-600 transition-colors">
                        <MoreHorizontal size={20} />
                      </button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-2" style={{ maxHeight: '480px' }}>
                      {alerts.map((alert, index) => (
                        <div key={index} className="p-4 m-2 rounded-2xl border border-transparent hover:border-slate-200/60 hover:bg-zinc-50 transition-all cursor-pointer group flex gap-4">
                          <div className="shrink-0 mt-1">
                            {alert.type === 'critical' && <div className="w-2 h-2 rounded-full bg-rose-500"></div>}
                            {alert.type === 'warning' && <div className="w-2 h-2 rounded-full bg-amber-500"></div>}
                            {alert.type === 'info' && <div className="w-2 h-2 rounded-full bg-indigo-500"></div>}
                          </div>

                          <div className="flex-1">
                            <div className="flex justify-between items-start mb-0.5">
                              <h4 className="text-sm font-semibold text-zinc-900">{alert.name}</h4>
                              <span className="text-[10px] text-zinc-400 font-medium bg-white border border-zinc-100 px-1.5 py-0.5 rounded-md">#{alert.id}</span>
                            </div>
                            <p className="text-xs text-zinc-500 mb-3">{alert.age} {lang === 'en' ? 'yrs' : 'वर्ष'} • {alert.village}</p>

                            <div className="flex items-center justify-between">
                              <span className={`text-[10px] px-2 py-1 rounded-md font-semibold tracking-wide uppercase inline-block
                                ${alert.type === 'critical' ? 'bg-rose-50 text-rose-700' :
                                  alert.type === 'warning' ? 'bg-amber-50 text-amber-700' :
                                  'bg-indigo-50 text-indigo-700'}`}
                              >
                                {alert.issue}
                              </span>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>

                    <div className="p-4 border-t border-zinc-100 bg-zinc-50/50 mt-auto">
                      <button className="w-full py-2.5 bg-white border border-zinc-200 rounded-xl text-xs font-semibold text-zinc-700 hover:bg-zinc-50 hover:border-zinc-300 transition-all shadow-sm">
                        {t.alert_btn}
                      </button>
                    </div>
                  </div>

                </div>

                {/* Data Sources Footer */}
                <div className="bg-white rounded-xl px-6 py-4 border border-slate-200/75 shadow-sm stagger-item" style={{ animationDelay: '0.9s' }}>
                  <div className="flex flex-col md:flex-row items-center justify-between gap-4">
                    <div className="flex items-center gap-3 text-xs text-zinc-500">
                      <FileText size={16} className="text-zinc-400" />
                      <span>Data pipeline:</span>
                      <div className="flex gap-2 flex-wrap justify-center">
                        <span className="px-2 py-0.5 rounded bg-slate-50 border border-slate-100 text-slate-500 font-mono text-[10px]">Mockup 1.xlsx</span>
                        <span className="px-2 py-0.5 rounded bg-slate-50 border border-slate-100 text-slate-500 font-mono text-[10px]">Mockup 2.xlsx</span>
                        <span className="px-2 py-0.5 rounded bg-slate-50 border border-slate-100 text-slate-500 font-mono text-[10px]">Mockup 3.xlsx</span>
                        <span className="px-2 py-0.5 rounded bg-slate-50 border border-slate-100 text-slate-500 font-mono text-[10px]">Mockup 4.xlsx</span>
                        <span className="px-2 py-0.5 rounded bg-slate-50 border border-slate-100 text-slate-500 font-mono text-[10px]">Mockup 5.xlsx</span>
                      </div>
                    </div>
                    <div className="text-xs text-zinc-400">
                      Last synced: <span className="text-zinc-500 font-mono">just now</span>
                    </div>
                  </div>
                </div>

              </div>
            )}
          </main>
        </div>
      );
    };

    // ============================================================
    // RENDER
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
